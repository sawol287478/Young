<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노우영</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9fb;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ── 다크모드 ── */
        body.dark {
            color: #e5e5e7;
            background-color: #121212;
        }

        body.dark header {
            background: rgba(24, 24, 28, 0.92);
            border-bottom-color: #2c2c2e;
        }

        body.dark .logo { color: #e5e5e7; }

        body.dark .page-title {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
        }

        body.dark .page-title p { color: #aaa; }

        body.dark .post-card {
            background: #1e1e1e;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        body.dark .post-title  { color: #e5e5e7; }
        body.dark .post-preview { color: #999; }

        body.dark .modal {
            background: #1e1e1e;
            color: #e5e5e7;
        }

        body.dark .modal-title { color: #e5e5e7; }

        body.dark .form-group label { color: #bbb; }

        body.dark .form-group input,
        body.dark .form-group textarea {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e5e5e7;
        }

        body.dark .form-group input:focus,
        body.dark .form-group textarea:focus {
            background: #333;
            border-color: #007AFF;
        }

        body.dark .btn-cancel {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #aaa;
        }

        body.dark .btn-cancel:hover { background: #333; }

        body.dark .btn-close {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #aaa;
        }

        body.dark .btn-close:hover { background: #333; }

        body.dark .btn-edit {
            background: transparent;
        }

        body.dark .btn-delete {
            background: transparent;
        }

        body.dark .post-detail-meta { color: #888; }
        body.dark .post-detail-body { color: #ccc; }

        body.dark .post-detail-meta,
        body.dark .post-detail-actions,
        body.dark .comments-section { border-color: #2c2c2e; }

        body.dark .comment-item {
            background: #2a2a2a;
        }

        body.dark .comment-author { color: #e5e5e7; }
        body.dark .comment-text   { color: #bbb; }

        body.dark .comment-form input {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e5e5e7;
        }

        body.dark .comment-form input:focus {
            background: #333;
            border-color: #007AFF;
        }

        body.dark .comment-form button {
            background: #e5e5e7;
            color: #111;
        }

        body.dark footer {
            color: #555;
            border-top-color: #2c2c2e;
        }

        body.dark .empty-state { color: #555; }

        /* 헤더 */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            gap: 0.8rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #333;
            transition: color 0.3s ease;
        }

        .nav-board {
            margin-left: auto;
            background: #007AFF;
            color: white;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-board:hover {
            background: #005ecb;
            transform: translateY(-2px);
        }

        /* 다크모드 토글 버튼 */
        .dark-toggle {
            background: none;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            padding: 7px 13px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .dark-toggle:hover {
            border-color: #007AFF;
            transform: translateY(-2px);
        }

        body.dark .dark-toggle {
            border-color: #444;
            background: #1c1c1e;
        }

        main {
            padding-top: 80px;
        }

        /* 페이지 타이틀 */
        .page-title {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 5rem 2rem 4rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            transition: background 0.3s ease;
        }

        .badge {
            background: #007AFF;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .page-title h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .page-title h1 strong {
            color: #007AFF;
        }

        .page-title p {
            margin-top: 0.8rem;
            font-size: 1.1rem;
            color: #666;
            transition: color 0.3s ease;
        }

        /* 게시판 영역 */
        .board-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
            animation: fadeIn 0.9s ease-out;
        }

        /* 글쓰기 버튼 */
        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #007AFF;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-write {
            background: #007AFF;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-write:hover {
            background: #005ecb;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0,122,255,0.3);
        }

        /* 게시글 목록 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .post-card {
            background: white;
            border-radius: 16px;
            padding: 1.4rem 1.6rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .post-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .post-title {
            font-size: 1rem;
            font-weight: 700;
            color: #222;
            flex: 1;
            transition: color 0.3s ease;
        }

        .post-meta {
            font-size: 0.78rem;
            color: #aaa;
            white-space: nowrap;
            margin-top: 2px;
        }

        .post-preview {
            margin-top: 0.5rem;
            font-size: 0.88rem;
            color: #777;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            transition: color 0.3s ease;
        }

        .post-footer {
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .comment-count {
            font-size: 0.78rem;
            color: #007AFF;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #bbb;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .empty-state span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.8rem;
        }

        /* 모달 공통 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .modal-overlay.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1.4rem;
            letter-spacing: -0.5px;
            transition: color 0.3s ease;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #555;
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #333;
            background: #fafafa;
            transition: border-color 0.2s, background 0.3s ease, color 0.3s ease;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007AFF;
            background: white;
        }

        .form-group textarea {
            min-height: 120px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            margin-top: 1.4rem;
        }

        .btn-cancel {
            padding: 10px 22px;
            border: 1.5px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: #f5f5f5;
        }

        .btn-submit {
            padding: 10px 22px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #005ecb;
        }

        /* 게시글 상세 모달 */
        .post-detail-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        .post-detail-meta {
            font-size: 0.82rem;
            color: #aaa;
            margin-bottom: 1.4rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid #f0f0f0;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .post-detail-body {
            font-size: 0.97rem;
            color: #444;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            transition: color 0.3s ease;
        }

        .post-detail-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.4rem;
            padding-top: 1.2rem;
            border-top: 1px solid #f0f0f0;
            transition: border-color 0.3s ease;
        }

        .btn-edit {
            padding: 8px 18px;
            border: 1.5px solid #007AFF;
            background: white;
            color: #007AFF;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: #007AFF;
            color: white;
        }

        .btn-delete {
            padding: 8px 18px;
            border: 1.5px solid #ff3b30;
            background: white;
            color: #ff3b30;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #ff3b30;
            color: white;
        }

        .btn-close {
            margin-left: auto;
            padding: 8px 18px;
            border: 1.5px solid #e0e0e0;
            background: white;
            color: #666;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: #f5f5f5;
        }

        /* 댓글 영역 */
        .comments-section {
            margin-top: 1.6rem;
            padding-top: 1.4rem;
            border-top: 1px solid #f0f0f0;
            transition: border-color 0.3s ease;
        }

        .comments-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #007AFF;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .comment-item {
            background: #f9f9fb;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.7rem;
            position: relative;
            transition: background 0.3s ease;
        }

        .comment-author {
            font-size: 0.82rem;
            font-weight: 700;
            color: #333;
            transition: color 0.3s ease;
        }

        .comment-date {
            font-size: 0.75rem;
            color: #bbb;
            margin-left: 0.5rem;
        }

        .comment-text {
            margin-top: 0.3rem;
            font-size: 0.9rem;
            color: #555;
            white-space: pre-wrap;
            word-break: break-word;
            transition: color 0.3s ease;
        }

        .comment-delete-btn {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            background: none;
            border: none;
            color: #ccc;
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .comment-delete-btn:hover {
            color: #ff3b30;
        }

        .comment-form {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
        }

        .comment-form input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            background: #fafafa;
            transition: border-color 0.2s, background 0.3s ease, color 0.3s ease;
        }

        .comment-form input:focus {
            outline: none;
            border-color: #007AFF;
            background: white;
        }

        .comment-form button {
            padding: 10px 18px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .comment-form button:hover {
            background: #000;
        }

        /* 푸터 */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: #aaa;
            border-top: 1px solid #eee;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="./index.html"><h1 class="logo">WOOYOUNG</h1></a>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="다크모드 전환">🌙</button>
        <a href="./board.html" class="nav-board">게시판</a>
    </div>
</header>

<main>
    <div class="page-title">
        <span class="badge">Board</span>
        <h1>자유롭게 이야기해요,<br><strong>게시판</strong>입니다.</h1>
        <p>누구든지 글을 남길 수 있어요.</p>
    </div>

    <div class="board-container">
        <div class="board-header">
            <span class="section-label">Posts</span>
            <button class="btn-write" onclick="openWriteModal()">✏️ 글쓰기</button>
        </div>

        <div class="post-list" id="postList">
            <!-- 게시글 렌더링 -->
        </div>
    </div>
</main>

<footer>
    <p>© 2026 Noh Wooyoung. Designed with Passion.</p>
</footer>

<!-- 글쓰기 / 수정 모달 -->
<div class="modal-overlay" id="writeModal">
    <div class="modal">
        <div class="modal-title" id="writeModalTitle">새 글 작성</div>
        <div class="form-group">
            <label>작성자</label>
            <input type="text" id="inputAuthor" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="inputTitle" placeholder="제목을 입력하세요">
        </div>
        <div class="form-group">
            <label>내용</label>
            <textarea id="inputBody" placeholder="내용을 입력하세요"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeWriteModal()">취소</button>
            <button class="btn-submit" onclick="submitPost()">등록</button>
        </div>
    </div>
</div>

<!-- 게시글 상세 모달 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="post-detail-title" id="detailTitle"></div>
        <div class="post-detail-meta" id="detailMeta"></div>
        <div class="post-detail-body" id="detailBody"></div>

        <!-- 댓글 섹션 -->
        <div class="comments-section">
            <div class="comments-label">댓글</div>
            <div id="commentList"></div>
            <div class="comment-form">
                <input type="text" id="commentAuthorInput" placeholder="이름">
                <input type="text" id="commentTextInput" placeholder="댓글을 입력하세요" style="flex:2">
                <button onclick="submitComment()">등록</button>
            </div>
        </div>

        <div class="post-detail-actions">
            <button class="btn-edit" onclick="openEditModal()">수정</button>
            <button class="btn-delete" onclick="deleteCurrentPost()">삭제</button>
            <button class="btn-close" onclick="closeDetailModal()">닫기</button>
        </div>
    </div>
</div>

<!-- 커스텀 확인 모달 -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal" style="max-width:360px; text-align:center; padding: 2.2rem 2rem;">
        <div style="font-size:2rem; margin-bottom:0.8rem;" id="confirmIcon">🗑️</div>
        <div style="font-size:1.05rem; font-weight:700; margin-bottom:0.5rem;" id="confirmMessage">정말 삭제하시겠어요?</div>
        <div style="font-size:0.85rem; color:#aaa; margin-bottom:1.6rem;" id="confirmSub">삭제하면 되돌릴 수 없어요.</div>
        <div style="display:flex; gap:0.6rem; justify-content:center;">
            <button class="btn-cancel" onclick="resolveConfirm(false)" style="flex:1;">취소</button>
            <button class="btn-delete" onclick="resolveConfirm(true)" style="flex:1;">삭제</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'wooyoung_board_posts';
    const DARK_KEY    = 'wooyoung_dark_mode';
    let posts = [];
    let currentPostId = null;
    let editMode = false;

    // ── 다크모드 ─────────────────────────────────
    function applyDark(dark) {
        document.body.classList.toggle('dark', dark);
        document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
    }

    function toggleDark() {
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem(DARK_KEY, !isDark);
        applyDark(!isDark);
    }

    applyDark(localStorage.getItem(DARK_KEY) === 'true');

    // ─── 커스텀 확인 모달 ────────────────────────
    let _confirmResolve = null;

    function customConfirm(message, sub) {
        document.getElementById('confirmMessage').textContent = message || '정말 삭제하시겠어요?';
        document.getElementById('confirmSub').textContent = sub || '삭제하면 되돌릴 수 없어요.';
        document.getElementById('confirmModal').classList.add('open');
        return new Promise(resolve => { _confirmResolve = resolve; });
    }

    function resolveConfirm(result) {
        document.getElementById('confirmModal').classList.remove('open');
        if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
    }

    document.getElementById('confirmModal').addEventListener('click', function(e) {
        if (e.target === this) resolveConfirm(false);
    });

    // ─── 로컬스토리지 ───────────────────────────
    function loadPosts() {
        const raw = localStorage.getItem(STORAGE_KEY);
        posts = raw ? JSON.parse(raw) : [];
    }

    function savePosts() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    // ─── 날짜 포맷 ──────────────────────────────
    function formatDate(ts) {
        const d = new Date(ts);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${y}.${m}.${day} ${h}:${min}`;
    }

    // ─── 목록 렌더링 ────────────────────────────
    function renderList() {
        const container = document.getElementById('postList');
        if (posts.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span>📝</span>
                    아직 작성된 글이 없어요.<br>첫 번째 글을 남겨보세요!
                </div>`;
            return;
        }
        container.innerHTML = [...posts].reverse().map(p => `
            <div class="post-card" onclick="openDetail(${p.id})">
                <div class="post-card-top">
                    <div class="post-title">${escapeHtml(p.title)}</div>
                    <div class="post-meta">${formatDate(p.createdAt)}</div>
                </div>
                <div class="post-preview">${escapeHtml(p.body)}</div>
                <div class="post-footer">
                    <span class="post-meta">✍️ ${escapeHtml(p.author)}</span>
                    <span class="comment-count">💬 ${p.comments ? p.comments.length : 0}</span>
                </div>
            </div>
        `).join('');
    }

    // ─── XSS 방지 ──────────────────────────────
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ─── 글쓰기 모달 ────────────────────────────
    function openWriteModal() {
        editMode = false;
        document.getElementById('writeModalTitle').textContent = '새 글 작성';
        document.getElementById('inputAuthor').value = '';
        document.getElementById('inputTitle').value = '';
        document.getElementById('inputBody').value = '';
        document.getElementById('writeModal').classList.add('open');
    }

    function closeWriteModal() {
        document.getElementById('writeModal').classList.remove('open');
    }

    function submitPost() {
        const author = document.getElementById('inputAuthor').value.trim();
        const title  = document.getElementById('inputTitle').value.trim();
        const body   = document.getElementById('inputBody').value.trim();

        if (!author || !title || !body) {
            alert('작성자, 제목, 내용을 모두 입력해주세요.');
            return;
        }

        if (editMode && currentPostId !== null) {
            const post = posts.find(p => p.id === currentPostId);
            if (post) {
                post.author = author;
                post.title  = title;
                post.body   = body;
            }
        } else {
            const newPost = {
                id: Date.now(),
                author,
                title,
                body,
                createdAt: Date.now(),
                comments: []
            };
            posts.push(newPost);
        }

        savePosts();
        closeWriteModal();
        renderList();

        if (editMode && currentPostId !== null) {
            openDetail(currentPostId);
        }
    }

    // ─── 게시글 상세 ────────────────────────────
    function openDetail(id) {
        const post = posts.find(p => p.id === id);
        if (!post) return;
        currentPostId = id;

        document.getElementById('detailTitle').textContent = post.title;
        document.getElementById('detailMeta').textContent = `✍️ ${post.author}  ·  ${formatDate(post.createdAt)}`;
        document.getElementById('detailBody').textContent = post.body;

        renderComments(post);
        document.getElementById('commentAuthorInput').value = '';
        document.getElementById('commentTextInput').value = '';
        document.getElementById('detailModal').classList.add('open');
    }

    function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('open');
        currentPostId = null;
    }

    // ─── 수정 모달 ──────────────────────────────
    function openEditModal() {
        const post = posts.find(p => p.id === currentPostId);
        if (!post) return;

        editMode = true;
        document.getElementById('writeModalTitle').textContent = '글 수정';
        document.getElementById('inputAuthor').value = post.author;
        document.getElementById('inputTitle').value  = post.title;
        document.getElementById('inputBody').value   = post.body;

        closeDetailModal();
        document.getElementById('writeModal').classList.add('open');
    }

    // ─── 게시글 삭제 ────────────────────────────
    async function deleteCurrentPost() {
        const ok = await customConfirm('글을 삭제할까요?', '삭제하면 되돌릴 수 없어요.');
        if (!ok) return;
        posts = posts.filter(p => p.id !== currentPostId);
        savePosts();
        closeDetailModal();
        renderList();
    }

    // ─── 댓글 렌더링 ────────────────────────────
    function renderComments(post) {
        const list = document.getElementById('commentList');
        if (!post.comments || post.comments.length === 0) {
            list.innerHTML = `<p style="font-size:0.85rem;color:#bbb;margin-bottom:0.8rem;">아직 댓글이 없어요.</p>`;
            return;
        }
        list.innerHTML = post.comments.map((c, idx) => `
            <div class="comment-item">
                <span class="comment-author">${escapeHtml(c.author)}</span>
                <span class="comment-date">${formatDate(c.createdAt)}</span>
                <div class="comment-text">${escapeHtml(c.text)}</div>
                <button class="comment-delete-btn" onclick="deleteComment(${idx})">✕</button>
            </div>
        `).join('');
    }

    // ─── 댓글 등록 ──────────────────────────────
    function submitComment() {
        const author = document.getElementById('commentAuthorInput').value.trim();
        const text   = document.getElementById('commentTextInput').value.trim();

        if (!author || !text) {
            alert('이름과 댓글 내용을 입력해주세요.');
            return;
        }

        const post = posts.find(p => p.id === currentPostId);
        if (!post) return;

        if (!post.comments) post.comments = [];
        post.comments.push({ author, text, createdAt: Date.now() });

        savePosts();
        renderComments(post);
        renderList();

        document.getElementById('commentAuthorInput').value = '';
        document.getElementById('commentTextInput').value   = '';
    }

    // ─── 댓글 삭제 ──────────────────────────────
    async function deleteComment(idx) {
        const ok = await customConfirm('댓글을 삭제할까요?', '삭제하면 되돌릴 수 없어요.');
        if (!ok) return;
        const post = posts.find(p => p.id === currentPostId);
        if (!post) return;
        post.comments.splice(idx, 1);
        savePosts();
        renderComments(post);
        renderList();
    }

    // ─── 모달 외부 클릭 닫기 (드래그 중 닫힘 방지) ─
    let _mouseDownTarget = null;

    document.addEventListener('mousedown', function(e) {
        _mouseDownTarget = e.target;
    });

    document.getElementById('writeModal').addEventListener('click', function(e) {
        if (e.target === this && _mouseDownTarget === this) closeWriteModal();
    });
    document.getElementById('detailModal').addEventListener('click', function(e) {
        if (e.target === this && _mouseDownTarget === this) closeDetailModal();
    });

    // ─── 초기화 ─────────────────────────────────
    loadPosts();
    renderList();
</script>

</body>
</html>
