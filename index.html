<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노우영</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9fb;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ── 다크모드 ── */
        body.dark {
            color: #e5e5e7;
            background-color: #121212;
        }

        body.dark header {
            background: rgba(24, 24, 28, 0.92);
            border-bottom-color: #2c2c2e;
        }

        body.dark .logo { color: #e5e5e7; }

        body.dark .hero {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
        }

        body.dark .hero p { color: #aaa; }

        body.dark .btn {
            background: #e5e5e7;
            color: #111;
        }

        body.dark .btn:hover {
            background: #fff;
        }

        body.dark footer { color: #555; }

        /* 헤더 */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            gap: 0.8rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #333;
            transition: color 0.3s ease;
        }

        .nav-board {
            margin-left: auto;
            background: #007AFF;
            color: white;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-board:hover {
            background: #005ecb;
            transform: translateY(-2px);
        }

        /* 다크모드 토글 버튼 */
        .dark-toggle {
            background: none;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            padding: 7px 13px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .dark-toggle:hover {
            border-color: #007AFF;
            transform: translateY(-2px);
        }

        body.dark .dark-toggle {
            border-color: #444;
            background: #1c1c1e;
        }

        /* 히어로 섹션 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
            transition: background 0.3s ease;
        }

        .hero-content {
            animation: fadeIn 1s ease-out;
        }

        .badge {
            background: #007AFF;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .hero h1 strong {
            color: #007AFF;
        }

        .hero p {
            font-size: 1.2rem;
            color: #666;
            transition: color 0.3s ease;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 15px 40px;
            background: #333;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #000;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn-tmi {
            background: #007AFF;
        }

        .btn-tmi:hover {
            background: #005ecb !important;
        }

        body.dark .btn-tmi {
            background: #007AFF !important;
            color: white !important;
        }

        body.dark .btn-tmi:hover {
            background: #005ecb !important;
        }

        /* 푸터 */
        footer {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            transition: color 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="./index.html"><h1 class="logo">WOOYOUNG</h1></a>
            <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="다크모드 전환">🌙</button>
            <a href="./board.html" class="nav-board">게시판</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <span class="badge">Web Developer</span>
                <h1>안녕하세요, <br><strong>노우영</strong>입니다.</h1>
                <p>웹 개발 쪽에 관심을 가지고 공부하고 있습니다.</p>
                <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2rem;">
                    <a href="./index2.html" class="btn" style="margin-top:0;">더 알아보기</a>
                    <a href="./tmi.html" class="btn btn-tmi" style="margin-top:0;">TMI 👀</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Noh Wooyoung. Designed with Passion.</p>
    </footer>

    <script>
        const DARK_KEY = 'wooyoung_dark_mode';

        function applyDark(dark) {
            document.body.classList.toggle('dark', dark);
            document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
        }

        function toggleDark() {
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem(DARK_KEY, !isDark);
            applyDark(!isDark);
        }

        // 초기 적용
        applyDark(localStorage.getItem(DARK_KEY) === 'true');
    </script>

</body>
</html>
