<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노우영 - TMI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.dark { color: #e5e5e7; background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%); }
        body.dark header { background: rgba(24,24,28,0.92); border-bottom-color: #2c2c2e; }
        body.dark .logo { color: #e5e5e7; }
        body.dark .page-title { background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%); }
        body.dark .tmi-hero { background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%); }
        body.dark .page-title p { color: #aaa; }
        body.dark .tmi-card { background: #1e1e1e; box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
        body.dark .tmi-card-heading { color: #e5e5e7; border-bottom-color: #2c2c2e; }
        body.dark .tmi-row { border-bottom-color: #2a2a2a; }
        body.dark .tmi-row-label { color: #666; }
        body.dark .tmi-emoji { background: #2a2a2a; }
        body.dark .tmi-item { background: #2a3a50; color: #5aadff; }
        body.dark .tmi-card-label { color: #aaa; }
        body.dark .btn { background: #e5e5e7; color: #111; }
        body.dark .btn:hover { background: #fff; }
        body.dark footer { color: #555; border-top-color: #2c2c2e; }
        body.dark .dark-toggle { border-color: #444; background: #1c1c1e; }
        body.dark .section-title { color: #e5e5e7; }

        /* 게임 태그 다크모드 */
        body.dark .game-tag {
            background: #1a1a1a;
            border-color: #5aadff;
            color: #5aadff;
        }
        body.dark .game-tag .game-logo:not(.no-filter) {
            filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(180deg);
        }

        /* 헤더 */
        header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            gap: 0.8rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #333;
            transition: color 0.3s ease;
        }

        .nav-board {
            margin-left: auto;
            background: #007AFF;
            color: white;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-board:hover { background: #005ecb; transform: translateY(-2px); }

        .dark-toggle {
            background: none;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            padding: 7px 13px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .dark-toggle:hover { border-color: #007AFF; transform: translateY(-2px); }

        main { padding-top: 80px; }

        .badge {
            background: #007AFF;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
        }

        /* TMI 큰 카드 */
        .tmi-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 2rem;
            animation: fadeIn 0.9s ease-out;
        }

        .tmi-card {
            background: white;
            border-radius: 24px;
            padding: 2.4rem 2.8rem;
            box-shadow: 0 4px 30px rgba(0,0,0,0.08);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .tmi-card-title-main {
            font-size: 0.75rem;
            font-weight: 700;
            color: #007AFF;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        .tmi-card-heading {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid #f0f0f0;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .tmi-row {
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            padding: 1.2rem 0;
            border-bottom: 1px solid #f5f5f5;
            transition: border-color 0.3s ease;
        }

        .tmi-row:last-child { border-bottom: none; }

        .tmi-emoji {
            font-size: 1.6rem;
            width: 48px;
            height: 48px;
            background: #f0f6ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.3s ease;
        }

        .tmi-row-content { flex: 1; }

        .tmi-row-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #aaa;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .tmi-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tmi-item {
            background: #f0f6ff;
            color: #007AFF;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .tmi-item-clickable {
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .tmi-item-clickable:hover {
            transform: translateY(-2px);
            background: #d6eaff;
        }

        body.dark .tmi-item-clickable:hover { background: #1e3a5f; }

        .game-list {
            display: none;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.7rem;
            animation: fadeIn 0.3s ease;
        }

        .game-list.open { display: flex; }

        /* 게임 태그 (로고 포함) */
        .game-tag {
            background: #fff;
            border: 1.5px solid #007AFF;
            color: #007AFF;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }

        .game-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,122,255,0.18);
            background: #f0f6ff;
        }

        body.dark .game-tag:hover {
            background: #1e3a5f;
        }

        .game-logo {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
            flex-shrink: 0;
            border-radius: 3px;
            mix-blend-mode: multiply;
        }

        .racing-logo {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
            flex-shrink: 0;
            border-radius: 3px;
            mix-blend-mode: multiply;
        }

        body.dark .game-logo:not(.racing-logo) {
            mix-blend-mode: screen;
        }

        body.dark .racing-logo {
            mix-blend-mode: normal;
        }

        /* 버튼 영역 */
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #333;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #000;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        footer {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.85rem;
            color: #aaa;
            border-top: 1px solid #eee;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="./index.html"><h1 class="logo">WOOYOUNG</h1></a>
            <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="다크모드 전환">🌙</button>
            <a href="./board.html" class="nav-board">게시판</a>
        </div>
    </header>

    <main>

        <div class="tmi-container" style="display: flex; flex-direction: column; padding-top: 120px; padding-bottom: 2rem;">
            <div class="tmi-card">
                <div class="tmi-card-title-main">About Me</div>
                <div class="tmi-card-heading">이런 사람이에요 👋</div>

                <!-- 취미 -->
                <div class="tmi-row">
                    <div class="tmi-emoji">🎮</div>
                    <div class="tmi-row-content">
                        <div class="tmi-row-label">Hobby · 취미</div>
                        <div class="tmi-items">
                            <span class="tmi-item tmi-item-clickable" onclick="toggleGames()">🎮 게임 <span id="gameArrow">▾</span></span>
                            <span class="tmi-item tmi-item-clickable" onclick="toggleRaces()">🏎️ 레이스 시청 <span id="raceArrow">▾</span></span>
                        </div>
                        <!-- 레이스 목록 -->
                        <div id="raceList" class="game-list">
                            <a href="https://www.formula1.com/" target="_blank" class="game-tag">
                                <img src="./이미지폴더/F1 logo.png" alt="Formula 1" class="racing-logo">
                                F1
                            </a>
                            <a href="https://www.fiaformula2.com/" target="_blank" class="game-tag"> 
                                <img src="./이미지폴더/F2 logo.png" alt="Formula 2" class="racing-logo">
                                F2
                            </a>
                            <a href="https://www.24hseries.com/" target="_blank" class="game-tag">
                                <img src="./이미지폴더/le_mans_transparent.png" alt="24h Series" class="racing-logo">
                                 24h
                            </a>
                        </div>
                        <!-- 게임 목록 (로고 적용) -->
                        <div id="gameList" class="game-list">
                            <a href="https://playvalorant.com/ko-kr/" target="_blank" class="game-tag valorant">
                                <img src="./이미지폴더/valorant logo.png" alt="발로란트" class="game-logo">
                                발로란트
                            </a>
                            <a href="https://overwatch.blizzard.com/ko-kr/" target="_blank" class="game-tag overwatch">
                                <img src="./이미지폴더/overwatch 512x512.png" alt="오버워치" class="game-logo">
                                오버워치
                            </a>
                            <a href="https://www.counter-strike.net/cs2?l=koreana" target="_blank" class="game-tag cs2">
                                <img src="./이미지폴더/cs2.png" alt="카운터스트라이크2" class="game-logo no-filter">
                                카운터스트라이크2
                            </a>
                        </div>
                        
                    </div>
                </div>

                <!-- 좋아하는 음식 -->
                <div class="tmi-row">
                    <div class="tmi-emoji">🍽️</div>
                    <div class="tmi-row-content">
                        <div class="tmi-row-label">Favorite Food · 좋아하는 음식</div>
                        <div class="tmi-items">
                            <span class="tmi-item">🍛 카레</span>
                            <span class="tmi-item">🍲 샤브샤브</span>
                        </div>
                    </div>
                </div>

            </div>
            <div style="margin-top: 1.4rem;">
                <a href="./index.html" class="btn">← 처음으로 돌아가기</a>
            </div>
        </div>

    </main>

    <footer>
        <p>© 2026 Noh Wooyoung. Designed with Passion.</p>
    </footer>

    <script>
        function toggleRaces() {
            const list = document.getElementById('raceList');
            const arrow = document.getElementById('raceArrow');
            const gameList = document.getElementById('gameList');
            const gameArrow = document.getElementById('gameArrow');

            // 게임 목록 닫기
            gameList.classList.remove('open');
            gameArrow.textContent = '▾';

            list.classList.toggle('open');
            arrow.textContent = list.classList.contains('open') ? '▴' : '▾';
        }

        function toggleGames() {
            const list = document.getElementById('gameList');
            const arrow = document.getElementById('gameArrow');
            const raceList = document.getElementById('raceList');
            const raceArrow = document.getElementById('raceArrow');

            // 레이스 목록 닫기
            raceList.classList.remove('open');
            raceArrow.textContent = '▾';

            list.classList.toggle('open');
            arrow.textContent = list.classList.contains('open') ? '▴' : '▾';
        }

        const DARK_KEY = 'wooyoung_dark_mode';

        function applyDark(dark) {
            document.body.classList.toggle('dark', dark);
            document.getElementById('darkToggle').textContent = dark ? '☀️' : '🌙';
        }

        function toggleDark() {
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem(DARK_KEY, !isDark);
            applyDark(!isDark);
        }

        applyDark(localStorage.getItem(DARK_KEY) === 'true');
    </script>

</body>
</html>
